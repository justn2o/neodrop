# electron-builder configuration for NeoDrop.
# Windows build: npm run build:win -> NSIS installer in dist/

appId: com.neodrop.app
productName: NeoDrop
copyright: © 2026 NeoDrop

directories:
  output: dist
  buildResources: build

files:
  - package.json
  - src/**/*

# Shared icon (build/icon.png, 256x256); electron-builder derives per-platform
# formats. For best results also provide build/icon.ico (Windows) and
# build/icon.icns (macOS); otherwise the PNG is converted.

win:
  icon: build/icon.png
  target:
    - target: nsis
      arch:
        - x64

nsis:
  # Classic installer: the user chooses the install folder.
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: NeoDrop

mac:
  icon: build/icon.png
  target:
    - target: dmg
      arch: [x64, arm64]
  category: public.app-category.utilities

linux:
  icon: build/icon.png
  target:
    - target: AppImage
      arch: [x64]
  category: Utility
