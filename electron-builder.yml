# Configuration electron-builder pour NeoDrop.
# Build Windows : npm run build:win → installateur NSIS dans dist/

appId: com.neodrop.app
productName: NeoDrop
copyright: © 2026 NeoDrop

directories:
  output: dist
  buildResources: build

files:
  - package.json
  - src/**/*

# Icône commune (build/icon.png, 256×256). electron-builder en dérive les
# formats par plateforme. Pour un rendu optimal, fournir aussi build/icon.ico
# (Windows) et build/icon.icns (macOS) ; à défaut, le PNG est converti.

win:
  icon: build/icon.png
  target:
    - target: nsis
      arch:
        - x64

nsis:
  # Installateur classique : l'utilisateur choisit le dossier d'installation.
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: NeoDrop

mac:
  icon: build/icon.png
  target:
    - target: dmg
      arch: [x64, arm64]
  category: public.app-category.utilities

linux:
  icon: build/icon.png
  target:
    - target: AppImage
      arch: [x64]
  category: Utility
