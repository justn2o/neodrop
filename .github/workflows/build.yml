name: Build

# Builds NeoDrop for Windows, macOS and Linux on NATIVE runners (the only way
# to get a proper macOS .dmg and a Windows .exe installer).
#
# - Manual: Actions tab -> "Build" -> "Run workflow".
# - On a "v*" tag (e.g. v1.0.0): also publishes a Release with the three
#   artifacts attached.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build the app
        # By default electron-builder builds the targets for the current OS
        # (NSIS on Windows, dmg on macOS, AppImage on Linux).
        run: npx electron-builder --publish never
        env:
          # Unsigned builds.
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: neodrop-${{ matrix.os }}
          path: |
            dist/*.AppImage
            dist/*.dmg
            dist/*.exe
            dist/*-win.zip
          if-no-files-found: ignore

      - name: Publish Release (on v* tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.AppImage
            dist/*.dmg
            dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
